# @decision DEC-V2-CI-GATE-FINAL-001
# @title Self-shave two-pass CI gate: push:main + PR unconditional + source-hash fast-skip cache
# @status accepted (2026-05-13 — supersedes DEC-V2-CI-GATE-001 production trigger design)
# @rationale The v2-check PR opt-in step is REMOVED (previously gated PRs via a commit-message
#   token — see DEC-V2-CI-GATE-001 historical record for the original design).
#   With #441 (harness derivation fix)
#   and #439 (shave glue-route fix for un-decomposable CallExpressions) both merged,
#   strict byte-identity under the two-pass cycle is achievable reliably. D3 operator
#   decision (a) selects unconditional on push:main + PR over nightly-only (b) and
#   branch-protection required-check (c). Alt-A (unconditional PR) was previously
#   rejected at DEC-V2-CI-GATE-001 due to the ~70-min cold-path wall-time; now accepted
#   because the source-hash fast-skip cache makes doc/config-only PRs ≤5 min via cache-hit
#   (DEC-CI-FAST-PATH-PHASE-1-005 Tier-1 target preserved). Branch-protection promotion
#   path (D3 → c): after ≥1 month (≥2026-06-13) of unbroken green unconditional runs,
#   an operator may add this workflow to required_status_checks via the
#   DEC-CI-MERGE-GATE-ENFORCE-005-style explicit-approval boundary. NOT executed in this
#   slice. Historical record: DEC-V2-CI-GATE-001 (push:main unconditional + PR opt-in
#   design — now superseded by this flip).

name: v2 self-shave

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: self-shave-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: two-pass bootstrap equivalence
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------------------------------------------------------------
      # Fast-skip cache.
      #
      # The two-pass equivalence assertion is a deterministic function of:
      #   - all .ts source under packages/*/src and examples/*/src
      #     (shave pipeline inputs and compile-self sources)
      #   - the harness itself (examples/v2-self-shave-poc/test/**)
      #   - the committed bootstrap/expected-roots.json (pass-1 verify target)
      #   - the lockfile (transitive shave-pipeline dependencies)
      #
      # If we have previously run the full two-pass cycle for this exact input
      # hash and it passed, re-running it produces a bit-identical result by
      # construction. We cache a marker file keyed on the input hash and skip
      # the slow path on cache hit.
      #
      # Cache miss = first time we've seen this input state, OR the previous
      # run failed (markers are written only after a green two-pass run).
      # Over-hashing (e.g. including *.test.ts beyond the harness file) causes
      # a benign cache miss — never a false hit. Under-hashing would be unsafe.
      #
      # PRs that touch only docs/config paths (README.md, MASTER_PLAN.md,
      # *.yml, etc.) do not change any hashed input and therefore always
      # cache-hit, keeping their wall-time ≤5 min (DEC-CI-FAST-PATH-PHASE-1-005).
      # ---------------------------------------------------------------------
      - name: Compute source hash
        id: source-hash
        run: |
          HASH=$(
            {
              find packages/*/src examples/*/src -name '*.ts' -type f -print0 \
                  | sort -z \
                  | xargs -0 sha256sum
              find examples/v2-self-shave-poc/test -name '*.ts' -type f -print0 \
                  | sort -z \
                  | xargs -0 sha256sum
              sha256sum bootstrap/expected-roots.json pnpm-lock.yaml
            } | sha256sum | awk '{print $1}'
          )
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "Computed input hash: $HASH"

      - name: Restore self-shave verified-marker cache
        id: verified-cache
        uses: actions/cache@v4
        with:
          path: tmp/.self-shave-verified-marker
          key: self-shave-verified-${{ steps.source-hash.outputs.hash }}

      - name: Skip — already verified for this source state
        if: steps.verified-cache.outputs.cache-hit == 'true'
        run: |
          echo "Cache hit — the two-pass equivalence check was previously verified"
          echo "for this exact input state. The result is deterministic by construction;"
          echo "re-running the 60-70 min cycle would produce a bit-identical outcome."
          echo
          cat tmp/.self-shave-verified-marker

      # ---------------------------------------------------------------------
      # Slow path — full two-pass cycle. Runs only on cache miss.
      # Mirrors the bootstrap.yml Tier-2 pattern exactly.
      # ---------------------------------------------------------------------
      - name: Set up pnpm
        if: steps.verified-cache.outputs.cache-hit != 'true'
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        if: steps.verified-cache.outputs.cache-hit != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        if: steps.verified-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        if: steps.verified-cache.outputs.cache-hit != 'true'
        run: pnpm -r build

      # @decision DEC-V2-CI-PREREQ-RUN-001
      # @title Order-of-operations contract: build → bootstrap → two-pass test
      # @status accepted (Issue #472, WI-V2-TWO-PASS-CI-FALSE-GREEN, 2026-05-13)
      # @rationale The two-pass equivalence test (two-pass-equivalence.test.ts) requires
      #   three prerequisite artifacts to be present before the test runner starts:
      #   1. packages/cli/dist/bin.js — produced by 'pnpm -r build' (step above)
      #   2. bootstrap/yakcc.registry.sqlite — produced by 'yakcc bootstrap' (this step)
      #   3. bootstrap/report.json — produced by 'yakcc bootstrap' (this step)
      #
      #   These three files are gitignored and do NOT exist on a fresh checkout. Before
      #   this fix (Issue #472), the workflow was missing the 'yakcc bootstrap' step
      #   entirely. The test code detected the missing files and silently early-returned
      #   via 'console.warn + return', which vitest counted as 15 passing tests — a
      #   false-green that masked all v2 self-shave regressions.
      #
      #   The correct sequence on cache miss is:
      #     1. pnpm -r build    — produces CLI binary (packages/cli/dist/bin.js)
      #     2. yakcc bootstrap  — produces registry A + report A (bootstrap/ dir)
      #     3. vitest (test)    — runs the full two-pass cycle using those artifacts
      #
      #   The two-pass cycle itself (compile-self + second bootstrap + byte-identity check)
      #   runs INSIDE the harness (beforeAll in two-pass-equivalence.test.ts), not as
      #   a separate workflow step. The harness handles all the internal orchestration.
      #   Wall-time estimate: ~5 min for build + bootstrap, ~60-70 min for two-pass test.
      #
      #   Cache-hit path (steps.verified-cache.outputs.cache-hit == 'true'): the entire
      #   build → bootstrap → test sequence is fast-skipped. The cache key is keyed on the
      #   source hash (all .ts sources + harness + expected-roots.json + pnpm-lock.yaml),
      #   so a cache hit is a proof that the identical input state previously passed the
      #   full two-pass cycle. The cache marker file is only written after a green run
      #   (step "Write self-shave verified-marker" below), so a stale false-green cache
      #   cannot arise once the test code is fixed to hard-fail on missing preconditions
      #   (DEC-V2-TWO-PASS-PRECONDITION-001).
      - name: Bootstrap pass 1 (produce registry A + report A)
        if: steps.verified-cache.outputs.cache-hit != 'true'
        run: |
          # yakcc bootstrap shaves all source files under packages/*/src and
          # examples/*/src, writing:
          #   - bootstrap/yakcc.registry.sqlite  (registry A — pass-1 registry)
          #   - bootstrap/expected-roots.json    (monotonic manifest accumulator)
          #   - bootstrap/report.json            (per-file shave outcomes — pass-1)
          #
          # The harness reads registry A and report A but does NOT re-run bootstrap
          # itself for pass 1 — it uses these artifacts as authoritative inputs.
          # (Risk R1 mitigation per plan.md §6 D5: re-running bootstrap inside the
          # test would conflate first-pass and second-pass semantics.)
          node packages/cli/dist/bin.js bootstrap \
            --registry bootstrap/yakcc.registry.sqlite \
            --manifest bootstrap/expected-roots.json \
            --report bootstrap/report.json

      - name: Run two-pass equivalence check
        if: steps.verified-cache.outputs.cache-hit != 'true'
        env:
          YAKCC_TWO_PASS: "1"
        run: |
          # With bootstrap/yakcc.registry.sqlite and bootstrap/report.json now present
          # (produced by the preceding step), and packages/cli/dist/bin.js available
          # (produced by 'pnpm -r build'), the two-pass harness can proceed.
          #
          # The harness runs the full two-pass cycle internally:
          #   Step 1: yakcc compile-self (produces tmp/two-pass/dist-recompiled/)
          #   Step 2: yakcc bootstrap on the recompiled workspace (produces registry B)
          #   Step 3: byte-identity comparison S1 ≡ S3 (the crown-jewel assertion)
          #
          # No continue-on-error: a two-pass failure is a hard CI failure.
          # A regression here means non-determinism was introduced in the
          # canonicalizer, AST-hash, or merkle path — the load-bearing claim.
          pnpm --filter @yakcc/v2-self-shave-poc test two-pass-equivalence

      - name: Write self-shave verified-marker
        if: steps.verified-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p tmp
          {
            echo "input-hash: ${{ steps.source-hash.outputs.hash }}"
            echo "verified-at: $(date -u +%FT%TZ)"
            echo "commit: ${{ github.sha }}"
            echo "ref: ${{ github.ref }}"
          } > tmp/.self-shave-verified-marker
          cat tmp/.self-shave-verified-marker
