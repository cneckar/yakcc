name: test
on:
  push:
    branches: [main]
  # pull_request trigger removed per DEC-CI-FAST-PATH-PHASE-1-005.
  # test.yml is Tier-2 (full pnpm -r build + test, 30 min); pr-ci.yml is the
  # sole PR gate. This workflow retains push:main for immediate post-merge
  # correctness. Nightly cron coverage is provided by nightly.yml
  # (DEC-CI-FAST-PATH-PHASE-3-001).

# No cancel-in-progress: post-merge push:main runs are independent and should
# complete. Each push to main is a distinct commit; all runs should finish so
# the operator gets a clean test signal per commit.
# DEC-CI-POSTMERGE-FULL-TEST-COMPLETE-001 (mirror of DEC-CI-POSTMERGE-ADVISORY-GATE-001
# applied to pr-ci-test-advisory.yml in PR cneckar/yakcc#605 closing cneckar/yakcc#596/#595).
concurrency:
  group: test-${{ github.ref }}
jobs:
  test:
    name: pnpm -r build + test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm -r test
