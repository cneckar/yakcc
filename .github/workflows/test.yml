name: test
on:
  push:
    branches: [main]
  # pull_request trigger removed per DEC-CI-FAST-PATH-PHASE-1-005.
  # test.yml is Tier-2 (full pnpm -r build + test, 30 min); pr-ci.yml is the
  # sole PR gate. This workflow retains push:main for post-merge correctness
  # until Phase 2 adds a proper nightly cron schedule.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    name: pnpm -r build + test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm -r test
