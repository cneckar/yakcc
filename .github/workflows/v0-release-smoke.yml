# v0-release-smoke.yml — Daily end-to-end smoke walkthrough CI
#
# @decision DEC-V0-RELEASE-SMOKE-CI-001
# @title v0-release smoke CI: ubuntu-latest authoritative, daily + on-push schedule
# @status accepted
# @rationale
#   WI-V0-RELEASE-SMOKE (issue #360) — the load-bearing v0-release blocker.
#   This workflow verifies that hook + discovery + substitution + atomize compose
#   correctly for a fresh user project in a clean ubuntu-latest environment.
#
#   UBUNTU-ONLY note removed: WI-ALPHA-WINDOWS-BIN-JS (#385) added a smoke-windows
#   job on windows-latest. Steps 2/3/4 now run on Windows after the bin.js main-module
#   guard was hardened with realpathSync (DEC-CLI-BIN-MAIN-MODULE-GUARD-WINDOWS-001).
#   The ubuntu job remains the authoritative signal; the windows job produces evidence.
#
#   SCHEDULE: 10:00 UTC daily — after the B1 nightly benchmark (09:00 UTC) so
#   both nightly jobs don't compete for runner capacity during peak UTC morning.
#   Also triggers on every push to main to validate each merge immediately.
#
#   NON-FATAL SMOKE STEP: smoke.mjs always exits 0 regardless of step results.
#   The post-comment step fires unconditionally (if: always()) and posts the
#   step-by-step table to issue #360. CI does not fail on a partial-pass smoke —
#   the comment is the operator signal. A future gate (separate job or check)
#   can parse the artifact JSON and set a hard exit if needed.
#
#   AUTO-CLOSE: post-smoke-comment.mjs closes issue #360 when all steps pass
#   (summary.allPass && warned === 0). If gh CLI lacks scope for issue.write, the close attempt
#   fails non-fatally (gh CLI step exits 0 via the script's own try/catch).
#
#   CONCURRENCY: cancel-in-progress=true — a newer nightly supersedes the prior
#   run. Safe to cancel because each run is fully independent (no accumulated state).
#
#   BUILD FILTER: builds only the packages that smoke.mjs depends on.
#   @yakcc/shave is intentionally excluded — pre-existing broken (DEC-SHAVE-SKIP-001).
#   The smoke walkthrough doesn't need @yakcc/shave directly (atomize imports it
#   lazily; shave is already compiled as a dep of hooks-base).
#
#   ARTIFACT RETENTION: 90 days. Each artifact named v0-release-smoke-<run_number>
#   for trend analysis. Windows artifacts named v0-release-smoke-windows-<run_number>.
#
# Triggers:
#   - Scheduled: 10:00 UTC daily
#   - workflow_dispatch: manual ad-hoc runs
#   - push to main: validates every merge

name: v0-release-smoke

on:
  schedule:
    - cron: "0 10 * * *"   # daily 10:00 UTC — after B1 nightly (09:00 UTC)
  workflow_dispatch:          # manual trigger for ad-hoc runs
  push:
    branches: [main]          # also run on push to main to validate every merge

concurrency:
  group: v0-release-smoke
  cancel-in-progress: true    # safe to cancel — each run is an independent walkthrough

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      issues: write           # for post-comment and optional auto-close of #360

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build required packages (skip @yakcc/shave — pre-existing broken)
        # @decision DEC-V0-RELEASE-SMOKE-BUILD-ORDER-001 / WI-V0-SMOKE-SEEDS-BUILD (#390)
        # @yakcc/ir MUST precede @yakcc/seeds (which imports from @yakcc/ir).
        # Surfaced post-WI-385 first smoke run on 3937873 — both ubuntu and
        # windows jobs failed at seeds build with "Cannot find module '@yakcc/ir'".
        # NOT switching to `pnpm -r build` because that would build @yakcc/shave
        # (pre-existing broken; deliberately skipped per the original sequence).
        # Follow-up to WI-339 (#339), WI-348 (#348), WI-364 (#364), WI-385 (#385).
        run: |
          pnpm --filter @yakcc/contracts build
          pnpm --filter @yakcc/registry build
          pnpm --filter @yakcc/ir build
          pnpm --filter @yakcc/seeds build
          pnpm --filter @yakcc/hooks-base build
          pnpm --filter @yakcc/hooks-claude-code build
          pnpm --filter @yakcc/cli build

      - name: Run v0-release smoke walkthrough
        id: smoke
        # NOTE: smoke.mjs always exits 0; step failures are captured in the artifact.
        # This prevents the CI job from blocking on partial-pass — the comment is the signal.
        run: node bench/v0-release-smoke/smoke.mjs

      - name: Post smoke results to issue #360
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node bench/v0-release-smoke/post-smoke-comment.mjs || echo "Warning: comment posting failed (non-fatal)"

      - name: Archive smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v0-release-smoke-${{ github.run_number }}
          path: tmp/v0-release-smoke/*.json
          retention-days: 90

  # @decision DEC-V0-RELEASE-SMOKE-CI-WINDOWS-001
  # @title Add windows-latest smoke job to produce Windows CLI evidence (#385)
  # @status accepted
  # @rationale WI-ALPHA-WINDOWS-BIN-JS (#385): the smoke runner previously hardcoded
  #   IS_WINDOWS skips for Steps 2/3/4, so Windows CI evidence was impossible.
  #   After removing those skips and hardening bin.ts with realpathSync, this job
  #   runs the same smoke walkthrough on windows-latest to prove Steps 2/3/4 pass.
  #   POST-COMMENT step is intentionally omitted — the ubuntu job owns the single
  #   comment on issue #360. Posting twice (ubuntu + windows) would spam the thread.
  #   The windows artifact (v0-release-smoke-windows-<run_number>) is the evidence.
  #   Non-fatal by the same policy as the ubuntu job: smoke.mjs exits 0 regardless
  #   of step results; the operator reads the artifact JSON for the verdict.
  smoke-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build required packages (skip @yakcc/shave — pre-existing broken)
        # @decision DEC-V0-RELEASE-SMOKE-BUILD-ORDER-001 / WI-V0-SMOKE-SEEDS-BUILD (#390)
        # @yakcc/ir MUST precede @yakcc/seeds (which imports from @yakcc/ir).
        # Surfaced post-WI-385 first smoke run on 3937873 — both ubuntu and
        # windows jobs failed at seeds build with "Cannot find module '@yakcc/ir'".
        # NOT switching to `pnpm -r build` because that would build @yakcc/shave
        # (pre-existing broken; deliberately skipped per the original sequence).
        # Follow-up to WI-339 (#339), WI-348 (#348), WI-364 (#364), WI-385 (#385).
        run: |
          pnpm --filter @yakcc/contracts build
          pnpm --filter @yakcc/registry build
          pnpm --filter @yakcc/ir build
          pnpm --filter @yakcc/seeds build
          pnpm --filter @yakcc/hooks-base build
          pnpm --filter @yakcc/hooks-claude-code build
          pnpm --filter @yakcc/cli build

      - name: Run v0-release smoke walkthrough (Windows)
        id: smoke-windows
        # NOTE: smoke.mjs always exits 0; step failures are captured in the artifact.
        # Steps 2/3/4 now run on Windows (IS_WINDOWS skips removed, #385).
        run: node bench/v0-release-smoke/smoke.mjs

      - name: Archive Windows smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v0-release-smoke-windows-${{ github.run_number }}
          path: tmp/v0-release-smoke/*.json
          retention-days: 90
