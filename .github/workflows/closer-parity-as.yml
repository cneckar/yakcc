# @decision DEC-CI-CLOSER-PARITY-AS-WORKFLOW-001
# Title: closer-parity-as long-lived CI lane (advisory, push:main + workflow_dispatch)
# Status: accepted
# Rationale: closer-parity-as.test.ts runs the full 4119-atom AS-backend
# corpus with a 60-min hookTimeout budget (DEC-AS-COMPILE-CACHE-001 +
# DEC-AS-CLOSER-PARITY-CONCURRENCY-001 made this feasible). It is too long
# to gate PRs (DEC-CI-MERGE-GATE-ENFORCE-001) but post-merge correctness
# matters. This workflow runs it on push:main and on operator-initiated
# workflow_dispatch with a content-keyed fast-skip cache so no-op commits
# are cheap. Mirror of wave-3-parity.yml's shape.

name: closer-parity-as

on:
  push:
    branches: [main]
  # workflow_dispatch enables operator-initiated runs from the GitHub UI —
  # useful after asc version bumps, threshold experiments, or to refresh
  # cold-run wall-clock evidence on demand.
  workflow_dispatch:
  # pull_request trigger intentionally omitted per DEC-CI-FAST-PATH-PHASE-1-005
  # and DEC-CI-MERGE-GATE-ENFORCE-001. PR-time coverage of the AS-backend is
  # provided by the cheap 2-atom real-asc test inside
  # packages/compile/src/as-compile-cache.test.ts via pr-ci.yml's
  # affected-package test step.

concurrency:
  group: closer-parity-as-${{ github.ref }}
  # @decision DEC-CI-CLOSER-PARITY-NO-CANCEL-001
  # @title closer-parity-as does NOT cancel in-progress runs
  # @status accepted
  # @rationale Pre-WI-612: cancel-in-progress=true killed every push:main
  # run in active-merge sessions before the verified-marker cache could
  # populate. Observed 2026-05-16: 5 consecutive runs cancelled (HEADs
  # 7eea48b / e49c885 / b5dff3a / 60e66e9 / 772b0c2), each preempted by
  # the next merge within minutes. Off PR critical path (this workflow
  # is push:main + workflow_dispatch only, per DEC-CI-CLOSER-PARITY-AS-WORKFLOW-001)
  # so concurrent runs are acceptable in cost; the benefit is that any
  # one run completing fills the content-keyed verified-marker cache
  # (DEC-AS-COMPILE-CACHE-001) so subsequent runs short-circuit.
  # Mirrors DEC-CI-TEST-ADVISORY-SEPARATE-WORKFLOW-001 (PR #582) / WI-596
  # (PR #605) pattern for pr-ci-test-advisory.yml. Cross-ref #612.
  cancel-in-progress: false

jobs:
  parity:
    name: closer-parity-as (full 4119-atom corpus)
    runs-on: ubuntu-latest
    # 60-min timeout matches the test's beforeAll(fn, 3_600_000) hookTimeout
    # at packages/compile/test/as-backend/closer-parity-as.test.ts L364.
    # Do NOT lower this; do NOT raise it (raising masks perf regressions,
    # lowering produces false timeouts).
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Fast-skip cache.
      #
      # The closer-parity-as result is a deterministic function of:
      #   - closer-parity-as.test.ts (the test body + corpus loader)
      #   - as-compile-cache.ts      (cache module landed in #531)
      #   - as-parity-runner.ts      (bounded-parallel runner landed in #531)
      #   - as-backend.ts            (asc invocation)
      #   - as-backend.props.ts      (sibling props file in same change-scope)
      #   - pnpm-lock.yaml           (asc version pin + transitive deps)
      #
      # Cache a marker file keyed on the input hash; skip on cache hit.
      # Cache miss = first time we've seen this source state OR a prior run
      # failed (markers are only written after a successful test pass).
      # -----------------------------------------------------------------------
      - name: Compute source hash
        id: source-hash
        run: |
          HASH=$(
            {
              sha256sum \
                packages/compile/test/as-backend/closer-parity-as.test.ts \
                packages/compile/src/as-compile-cache.ts \
                packages/compile/src/as-parity-runner.ts \
                packages/compile/src/as-backend.ts \
                packages/compile/src/as-backend.props.ts
              sha256sum pnpm-lock.yaml
            } | sha256sum | awk '{print $1}'
          )
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "Computed input hash: $HASH"

      - name: Restore verified-marker cache
        id: verified-cache
        uses: actions/cache@v4
        with:
          path: tmp/closer-parity-as/.verified-marker
          key: closer-parity-as-verified-${{ steps.source-hash.outputs.hash }}

      # -----------------------------------------------------------------------
      # Seed AS wasm shard cache from checked-in bootstrap/ (WI-631 Stage B).
      #
      # This step copies bootstrap/as-cache-seed/* into tmp/yakcc-as-cache/
      # so cold runs (no actions/cache hit) start with a populated cache.
      # The next step (Stage A restore) overlays any actions/cache hit on
      # top; --no-clobber ensures the cache (potentially fresher than the
      # committed seed) wins on collision.
      # @decision DEC-AS-WASM-SEED-001
      # @decision DEC-AS-WASM-SEED-003
      # @decision DEC-AS-WASM-SEED-COPY-MODE-001
      # -----------------------------------------------------------------------
      - name: Seed AS wasm shard cache from bootstrap/
        if: steps.verified-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p tmp/yakcc-as-cache
          if [ -d bootstrap/as-cache-seed ]; then
            cp -rn bootstrap/as-cache-seed/. tmp/yakcc-as-cache/
            echo "Seeded $(find tmp/yakcc-as-cache -name '*.wasm' | wc -l) wasm shard(s) from bootstrap/as-cache-seed/"
          else
            echo "bootstrap/as-cache-seed/ not present; skipping seed copy"
          fi

      # -----------------------------------------------------------------------
      # AS wasm shard cache (DEC-AS-COMPILE-CACHE-002 on-disk persistence).
      #
      # This is the per-atom wasm byte cache that as-compile-cache.ts writes
      # to <repoRoot>/tmp/yakcc-as-cache/. Restoring it across CI runs means
      # any atom whose source hash matches a prior run skips asc entirely —
      # breaks the chicken-and-egg per #631 / #485 where cold-runs hit the
      # 60-min wall before the verified-marker can populate.
      #
      # Cache key is intentionally NOT tied to test file or corpus — atom
      # source hash is the cache key inside as-compile-cache.ts, so we only
      # need to invalidate when the compile pipeline ITSELF changes (asc
      # version via pnpm-lock, the as-backend.ts invocation logic, or the
      # cache module itself). Restore-keys provides graceful degradation: a
      # stale cache is still better than a cold start.
      # @decision DEC-AS-WASM-CACHE-CI-001
      # @title Restore tmp/yakcc-as-cache/ across closer-parity-as CI runs (WI-631 Stage A)
      # @status accepted
      # @rationale Breaks chicken-and-egg per #631 / #485. Cache key restricted
      # to compile-pipeline files so test/corpus churn does not invalidate.
      # Restore-keys provides graceful degradation. actions/cache@v4 saves
      # automatically on successful job exit (no separate save step).
      - name: Restore AS wasm shard cache
        if: steps.verified-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: tmp/yakcc-as-cache
          key: yakcc-as-wasm-cache-v1-${{ hashFiles('packages/compile/src/as-backend.ts', 'packages/compile/src/as-compile-cache.ts', 'pnpm-lock.yaml') }}
          restore-keys: |
            yakcc-as-wasm-cache-v1-

      - name: Skip — already verified for this source state
        if: steps.verified-cache.outputs.cache-hit == 'true'
        run: |
          echo "Cache hit — closer-parity-as was previously verified for this exact source state."
          echo
          cat tmp/closer-parity-as/.verified-marker

      # -----------------------------------------------------------------------
      # Slow path — runs only on cache miss.
      # -----------------------------------------------------------------------
      - name: Set up pnpm
        if: steps.verified-cache.outputs.cache-hit != 'true'
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        if: steps.verified-cache.outputs.cache-hit != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        if: steps.verified-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        if: steps.verified-cache.outputs.cache-hit != 'true'
        run: pnpm -r build

      - name: Run closer-parity-as (full 4119-atom corpus)
        if: steps.verified-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @yakcc/compile test -- test/as-backend/closer-parity-as.test.ts

      - name: Write verified-marker
        if: steps.verified-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p tmp/closer-parity-as
          {
            echo "input-hash: ${{ steps.source-hash.outputs.hash }}"
            echo "verified-at: $(date -u +%FT%TZ)"
            echo "commit: ${{ github.sha }}"
            echo "ref: ${{ github.ref }}"
          } > tmp/closer-parity-as/.verified-marker
          cat tmp/closer-parity-as/.verified-marker
