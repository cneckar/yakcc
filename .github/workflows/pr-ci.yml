# @decision DEC-CI-FAST-PATH-PHASE-1-001
# Title: Tier-1 PR CI workflow (pr-ci.yml) — fast-path for pull requests
# Status: accepted
# Rationale: The existing trio (bootstrap.yml, test.yml, wave-3-parity.yml) all
# fire on every PR and take 30–90 min each. Phase 1 ships a separate Tier-1
# workflow that gates PRs in ≤5 min on the median PR by running:
#   1. lint + typecheck — full workspace, always (cheap, turbo-cached)
#   2. build + test — affected packages only via pnpm --filter "...[origin/main]"
#   3. branch hygiene — scripts/pre-pr-check.sh (stale-rebase damage detection)
# The trio retains push:main triggers for post-merge correctness; pr-ci.yml is
# the sole PR gate. No source files are touched; this is a CI configuration
# change only.

name: pr-ci

on:
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same ref when a new commit is pushed.
# This is the right behavior for PR CI — we only care about the latest commit.
# DEC-CI-FAST-PATH-PHASE-1-001: group keyed on github.ref so each PR branch
# gets its own concurrency slot.
concurrency:
  group: pr-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # lint — full workspace, always
  # DEC-CI-FAST-PATH-PHASE-1-003: lint runs over all packages because Biome is
  # pure static analysis and cheap. Running only on affected packages risks
  # missing a downstream lint error in a consumer that isn't in the diff.
  # Turbo's local cache skips unchanged packages automatically.
  # ---------------------------------------------------------------------------
  lint:
    name: lint (full workspace)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth: 0 is required so pnpm --filter "[origin/<base>]" can
          # compare against the PR base branch. Without full history, the base
          # ref is not available and the affected-package filter fails.
          fetch-depth: 0

      # pnpm/action-setup@v4 with NO `with: version:` — honors the single
      # packageManager authority in package.json (DEC-CI-OFFLINE-004).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint (full workspace)
        run: pnpm lint

  # ---------------------------------------------------------------------------
  # typecheck — full workspace, always
  # DEC-CI-FAST-PATH-PHASE-1-003: same rationale as lint. A public type rename
  # in @yakcc/contracts breaks @yakcc/registry's typecheck even if only
  # contracts files are in the diff. Full-workspace typecheck catches this.
  # ---------------------------------------------------------------------------
  typecheck:
    name: typecheck (full workspace)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck (full workspace)
        run: pnpm typecheck

  # ---------------------------------------------------------------------------
  # build — full workspace, GATING
  # DEC-CI-MERGE-GATE-ENFORCE-002 (amended 2026-05-11 per #320): build is the
  # merge gate. Full-workspace `pnpm -r build` (no affected filter) catches
  # downstream package-graph regressions that the affected-resolution misses
  # (#294 was exactly this failure mode).
  # ---------------------------------------------------------------------------
  build:
    name: build (full workspace)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build full workspace
        run: pnpm -r build

  # ---------------------------------------------------------------------------
  # test-advisory — affected packages, NON-GATING
  # DEC-CI-MERGE-GATE-ENFORCE-001: tests do NOT gate merges per operator policy
  # ("tests that take this fucking long sure as fuck shouldn't be critical path
  # for merges", 2026-05-11). `continue-on-error: true` at the JOB level surfaces
  # failures in the PR UI for fast feedback but does NOT block the merge button.
  # Slice C's branch protection MUST NOT include this job in required contexts.
  # ---------------------------------------------------------------------------
  test-advisory:
    name: test (affected packages, advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build full workspace (required before tests can resolve workspace deps)
        run: pnpm -r build

      - name: Test affected packages (non-gating)
        # Affected filter retained for cycle-time speed (DEC-CI-FAST-PATH-PHASE-1-001).
        # Failure surfaces in PR UI but does NOT block merge (see continue-on-error
        # at the job level above).
        run: |
          FILTER=$(bash scripts/affected-packages.sh)
          echo "Affected filter: $FILTER"
          eval "pnpm $FILTER test"

  # ---------------------------------------------------------------------------
  # branch-hygiene — stale-rebase damage detection
  # DEC-CI-FAST-PATH-PHASE-1-006: invokes scripts/pre-pr-check.sh which detects
  # file deletions outside the WI's scope manifest (stale-rebase damage class).
  # The script exits non-zero when deletions are detected, blocking the PR.
  # Note: diff-stat warnings (size) remain soft/warn-only per the script's
  # design; only deletion detection is a hard failure.
  # ---------------------------------------------------------------------------
  branch-hygiene:
    name: branch hygiene check
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Branch hygiene (pre-pr-check)
        run: bash scripts/pre-pr-check.sh

  # ---------------------------------------------------------------------------
  # airgap-bench — B6a air-gapped / zero-outbound CI gate
  # DEC-BENCH-B6-001: runs `pnpm bench:airgap` (node bench/B6-airgap/run.mjs)
  # on every PR to detect outbound network regressions introduced by any change.
  # Uses the pure-JS network interceptor (Option a) — no tcpdump/sudo needed.
  # Platform: ubuntu-latest only. Windows runners are skipped with an explicit
  # message (the JS interceptor works on Windows but the gate is Linux-anchored).
  # B6b is NOT run in CI (requires ANTHROPIC_API_KEY; opt-in only).
  # Timeout: 15 min — accommodates first-run pnpm install + build on cold cache.
  # ---------------------------------------------------------------------------
  airgap-bench:
    name: B6a air-gap benchmark (zero outbound)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build all packages (required before bench)
        run: pnpm build

      - name: B6a — air-gap benchmark (zero outbound connections)
        # Fail the PR if any outbound network connection is detected during the
        # offline 7-step workload. The harness exits non-zero on any outbound hit.
        run: pnpm bench:airgap

      - name: Upload B6a results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: b6a-results-${{ github.run_id }}
          path: bench/B6-airgap/results-b6a-*.json
          if-no-files-found: warn
